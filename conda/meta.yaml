{% set name = "openalea.pgljupyter" %}
{% set version = "0.1.21" %}

package:
  name: "{{ name|lower }}"
  version: "{{ version }}"
  
source:	
  url: "https://files.pythonhosted.org/packages/e6/0d/6dfd10d223a2571b4f0990afb1f63840bf671c2a382db55d80bcb8336776/pgljupyter-0.1.21-py2.py3-none-any.whl"	
  sha256: 7ce801db6d8212d96620ae64e4fb786ac4e857c35563c2ab9852de754f2ee83c1	

build:
  number: 0
  script: "{{ PYTHON }} -m pip install pgljupyter -vv"

requirements:
  host:
    - ipywidgets >=7.5.0
    - jsonschema >=3.2.0
    - jupyterlab >=2.2.0
    - openalea.lpy >=3.4.0
    - openalea.plantgl >=3.4.0
    - pip
    - python
    - toml >=0.10.1
  run:
    - ipywidgets >=7.5.0
    - jsonschema >=3.2.0
    - jupyterlab >=2.2.0
    - openalea.lpy >=3.4.0
    - openalea.plantgl >=3.4.0
    - python
    - toml >=0.10.1

test:
  imports:
    - pgljupyter
    - pgljupyter.nbextension
    - pgljupyter.tests

about:
  home: "https://github.com/jvail/plantgl-jupyter"
  license: Cecill
  license_family: OTHER
  license_file: 
  summary: "PlantGL and L-Py jupyter widget"
  doc_url: 
  dev_url: 

extra:
  recipe-maintainers:
    - jvail, fredboudon
